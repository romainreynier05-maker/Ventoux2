<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ventoux 2026</title>
<style>
  :root{
    --bg:#0f1512; --card:#161f1a; --card2:#1c2620; --border:#2a362f;
    --green:#4ade80; --green-dim:#2d5a3f; --orange:#fb923c; --red:#f87171;
    --text:#e8ede9; --text-dim:#8b978f; --blue:#60a5fa;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:78px;
    min-height:100vh;
  }
  header{
    padding:16px 16px 10px; position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg,var(--bg) 80%,transparent);
  }
  .title-row{display:flex; align-items:center; justify-content:space-between;}
  h1{font-size:19px; margin:0; font-weight:700; letter-spacing:-0.3px;}
  .badge{font-size:11px; color:var(--text-dim); background:var(--card2); padding:3px 8px; border-radius:20px;}
  .countdown{
    margin-top:12px; background:linear-gradient(135deg,var(--card2),var(--card)); border:1px solid var(--border);
    border-radius:16px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
  }
  .countdown .num{font-size:32px; font-weight:800; color:var(--green); line-height:1;}
  .countdown .label{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .countdown .date{font-size:13px; color:var(--text); text-align:right;}
  .countdown .date b{color:var(--orange);}
  main{padding:0 16px 20px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:16px; margin-bottom:12px;
  }
  .card h2{font-size:15px; margin:0 0 10px; color:var(--green); display:flex; align-items:center; gap:6px;}
  .card h3{font-size:13px; margin:14px 0 8px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px;}
  .row{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .pill{font-size:11px; padding:3px 9px; border-radius:20px; font-weight:600;}
  .pill.z1{background:#1e3a2f; color:#6ee7b7;}
  .pill.z2{background:#1e3a4f; color:#7dd3fc;}
  .pill.z3{background:#4a3a1e; color:#fcd34d;}
  .pill.z4{background:#4a1e1e; color:#fca5a5;}
  .pill.recup{background:#2a2a3a; color:#c4b5fd;}
  .task{
    display:flex; align-items:flex-start; gap:12px; padding:12px; background:var(--card2);
    border-radius:12px; margin-bottom:8px; border:1px solid transparent;
  }
  .task.done{opacity:0.5; border-color:var(--green-dim);}
  .checkbox{
    width:24px; height:24px; border-radius:7px; border:2px solid var(--text-dim);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .checkbox.checked{background:var(--green); border-color:var(--green);}
  .checkbox.checked::after{content:'✓'; color:#0f1512; font-weight:800; font-size:15px;}
  .checkbox.missed{background:var(--red); border-color:var(--red);}
  .checkbox.missed::after{content:'✕'; color:#2e1214; font-weight:800; font-size:13px;}
  .status-controls{display:flex; align-items:center; gap:8px; margin-top:2px;}
  .miss-btn{
    font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--border);
    background:var(--card2); color:var(--text-dim); font-family:inherit;
  }
  .miss-btn.active{background:#4a1e1e; color:#fca5a5; border-color:#6b2a2a;}
  .quick-item{
    display:flex; align-items:center; justify-content:space-between; padding:10px 0;
    border-bottom:1px solid var(--border); gap:8px;
  }
  .quick-item:last-child{border-bottom:none;}
  .quick-item .qi-info{flex:1;}
  .quick-item .qi-date{font-size:11px; color:var(--text-dim);}
  .quick-item .qi-name{font-size:13px; font-weight:600;}
  .quick-actions{display:flex; gap:6px; flex-shrink:0;}
  .qa-btn{font-size:11px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-family:inherit;}
  .qa-btn.ok{color:var(--green); border-color:var(--green-dim);}
  .qa-btn.no{color:var(--red); border-color:#6b2a2a;}
  .banner{border-radius:14px; padding:14px; margin-bottom:12px; font-size:13.5px; line-height:1.5;}
  .banner.ok{background:#152a1e; border:1px solid var(--green-dim); color:#bde5c8;}
  .banner.warn{background:#2e2418; border:1px solid #5a4a2a; color:#f5dcae;}
  .banner.danger{background:#2e1e1e; border:1px solid #6b2a2a; color:#f5c2c2;}
  .week-stat-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border);}
  .week-stat-row:last-child{border-bottom:none;}
  .week-stat-row .wn{width:36px; flex-shrink:0; font-weight:700; font-size:12px; color:var(--text-dim);}
  .mini-bar{flex:1; height:8px; background:var(--card2); border-radius:4px; overflow:hidden; display:flex;}
  .mini-bar .seg-done{background:var(--green);}
  .mini-bar .seg-missed{background:var(--red);}
  .mini-bar .seg-unresolved{background:#3a3a2a;}
  .alert-check{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px;}
  .alert-check:last-child{border-bottom:none;}
  .task-body{flex:1;}
  .task-title{font-size:14.5px; font-weight:600; margin-bottom:3px;}
  .task-meta{font-size:12px; color:var(--text-dim);}
  .task-note{font-size:12px; color:var(--text-dim); margin-top:4px; font-style:italic;}
  .tip{
    background:#1e2a1e; border-left:3px solid var(--green); padding:10px 12px; border-radius:8px;
    font-size:13px; color:#bde5c8; margin-top:10px; line-height:1.4;
  }
  .warn{
    background:#2e1e1e; border-left:3px solid var(--red); padding:10px 12px; border-radius:8px;
    font-size:13px; color:#f5c2c2; margin-top:10px; line-height:1.4;
  }
  .info{
    background:#1e2530; border-left:3px solid var(--blue); padding:10px 12px; border-radius:8px;
    font-size:13px; color:#bcd4f5; margin-top:10px; line-height:1.4;
  }
  nav{
    position:fixed; bottom:0; left:0; right:0; background:rgba(15,21,18,0.97);
    backdrop-filter:blur(10px); border-top:1px solid var(--border);
    display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    z-index:20;
  }
  nav button{
    flex:1; background:none; border:none; color:var(--text-dim); font-size:10.5px;
    padding:8px 2px 4px; display:flex; flex-direction:column; align-items:center; gap:3px;
    font-family:inherit;
  }
  nav button .ic{font-size:20px;}
  nav button.active{color:var(--green);}
  .week-header{
    display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:14px 16px;
  }
  .week-header.today{background:linear-gradient(90deg,rgba(74,222,128,0.12),transparent); border-radius:12px;}
  .week-title{font-weight:700; font-size:14.5px;}
  .week-sub{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .chev{color:var(--text-dim); transition:transform 0.2s; font-size:13px;}
  .chev.open{transform:rotate(90deg);}
  .week-body{padding:0 16px 14px; display:none;}
  .week-body.open{display:block;}

    display:flex; justify-content:space-between; align-items:center; padding:9px 10px;

  .day-line .d{color:var(--text-dim); width:52px; flex-shrink:0; font-size:11.5px;}
  .day-line .a{flex:1;}
  .meta-strip{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0;}
  .meta-strip span{font-size:11px; background:var(--card2); padding:4px 9px; border-radius:8px; color:var(--text-dim);}
  .taper-item{
    display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);
  }
  .taper-item:last-child{border-bottom:none;}
  .taper-day{width:56px; flex-shrink:0; text-align:center;}
  .taper-day .j{font-size:11px; color:var(--orange); font-weight:700;}
  .taper-day .dt{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .taper-content{flex:1; font-size:13px; line-height:1.5;}
  .taper-content b{color:var(--text);}
  .table-mini{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:6px;}
  .table-mini th{text-align:left; color:var(--text-dim); font-weight:600; padding:6px 4px; border-bottom:1px solid var(--border); font-size:11px;}
  .table-mini td{padding:7px 4px; border-bottom:1px solid var(--border); vertical-align:top;}
  .chk-list-item{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13.5px;}
  .chk-list-item:last-child{border-bottom:none;}
  .chk-list-item.done{opacity:0.45; text-decoration:line-through;}
  .subtabs{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px;}
  .subtabs button{
    white-space:nowrap; background:var(--card2); border:1px solid var(--border); color:var(--text-dim);
    padding:7px 13px; border-radius:20px; font-size:12.5px; font-family:inherit;
  }
  .subtabs button.active{background:var(--green-dim); color:var(--green); border-color:var(--green-dim);}
  .install-tip{
    font-size:12px; color:var(--text-dim); text-align:center; padding:10px; background:var(--card2);
    border-radius:10px; margin-bottom:12px; line-height:1.5;
  }
  .progress-bar{height:6px; background:var(--card2); border-radius:3px; overflow:hidden; margin-top:8px;}
  .progress-fill{height:100%; background:var(--green); border-radius:3px; transition:width 0.3s;}
  .hidden{display:none;}
</style>
</head>

function fmtDate(d){
  return d.getDate() + ' ' + ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'][d.getMonth()];
}
function isoKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function sameDay(a,b){ return isoKey(a)===isoKey(b); }

/* ============ STORAGE ============
   state.status[dateKey] = 'done' | 'missed'  (une séance non renseignée = absente de l'objet)
   Utilise window.storage si dispo (environnement Claude), sinon localStorage
   (nécessaire pour un fonctionnement autonome une fois l'app ajoutée à l'écran d'accueil iOS).
*/
let state = {status:{}, checklists:{}};
function migrateOldFormat(parsed){
  const merged = Object.assign({status:{}, checklists:{}}, parsed);
  if(parsed && parsed.done){
    Object.keys(parsed.done).forEach(k=>{ if(parsed.done[k]) merged.status[k] = 'done'; });
    delete merged.done;
  }
  return merged;
}
async function loadState(){
  try{
    if(window.storage && typeof window.storage.get === 'function'){
      const res = await window.storage.get('ventoux_state');
      if(res && res.value){ state = migrateOldFormat(JSON.parse(res.value)); }
      return;
    }
  }catch(e){ /* pas encore de données côté Claude */ }
  try{
    const raw = localStorage.getItem('ventoux_state');
    if(raw) state = migrateOldFormat(JSON.parse(raw));
  }catch(e){ /* localStorage indisponible ou vide */ }
}
async function saveState(){
  const json = JSON.stringify(state);
  try{
    if(window.storage && typeof window.storage.set === 'function'){
      await window.storage.set('ventoux_state', json);
      return;
    }
  }catch(e){ /* bascule sur localStorage ci-dessous */ }
  try{ localStorage.setItem('ventoux_state', json); }catch(e){ console.error(e); }
}
function setStatus(key, val){
  if(val) state.status[key] = val; else delete state.status[key];
  saveState();
}
function toggleChecklist(listId, itemId){
  if(!state.checklists[listId]) state.checklists[listId] = {};
  state.checklists[listId][itemId] = !state.checklists[listId][itemId];
  saveState();
}

/* ============ HELPERS SEMAINE ============ */
function getWeekForDate(d){
  for(const w of weeks){
    const start = new Date(w.start+'T00:00:00');
    const end = addDays(start,6);
    if(d>=start && d<=end) return w;
  }
  return null;
}
function getDayIndexInWeek(w,d){
  const start = new Date(w.start+'T00:00:00');
  return Math.round((d-start)/86400000);
}

let activeTab = 'today';
let openWeek = null;

function render(){
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((VENTOUX_DATE - today)/86400000);
  document.getElementById('countdown-num').textContent = diffDays >= 0 ? diffDays : 'J+' + Math.abs(diffDays);
  const curWeek = getWeekForDate(today);
  document.getElementById('week-badge').textContent = curWeek ? ('Semaine ' + curWeek.num + '/12') : (diffDays<0 ? 'Objectif atteint 🎉' : 'Hors programme');

  const main = document.getElementById('main');
  if(activeTab==='today') main.innerHTML = renderToday(today, curWeek, diffDays);
  else if(activeTab==='calendar') main.innerHTML = renderCalendar(today);
  else if(activeTab==='taper') main.innerHTML = renderTaper(today);
  else if(activeTab==='adjust') main.innerHTML = renderAdjustment(today);
  else if(activeTab==='nutrition') main.innerHTML = renderNutrition();
  else if(activeTab==='gear') main.innerHTML = renderGear();

  attachHandlers();
}

function renderCalendar(today){

  weeks.forEach(w=>{

    const end = addDays(start,6);
    const isCurrent = today>=start && today<=end;
    const isOpenW = openWeek===w.num || isCurrent;
    html += `
    <div>
      <div class="week-header ${isCurrent?'today':''}" data-week="${w.num}">
        <div>
          <div class="week-title">Semaine ${w.num} · ${w.theme}</div>

      <div class="week-body ${isOpenW?'open':''}">
        ${w.days.map((d,i)=>{
          const dt = addDays(start,i);
          const isToday = sameDay(dt,today);
          return `<div class="day-line ${isToday?'today':''}">
            <span class="d">${DAY_SHORT[dt.getDay()]} ${dt.getDate()}</span>

        }).join('')}
        <div class="tip" style="margin-top:10px;">${w.objectif}</div>
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

/* ============ AJUSTEMENT DU PROGRAMME (logique chapitre 13 du guide) ============ */
function computeWeekStats(w, today){
  const start = new Date(w.start+'T00:00:00');
  const end = addDays(start,6);
  let total=0, done=0, missed=0, unresolved=0;
  w.days.forEach((d,i)=>{
    if(d.z==='recup') return; // un repos ne se "manque" pas
    const dt = addDays(start,i);
    if(dt > today) return; // pas encore eu lieu
    total++;
    const key = isoKey(dt);
    const st = state.status[key];
    if(st==='done') done++;
    else if(st==='missed') missed++;
    else unresolved++;
  });
  return {week:w, total, done, missed, unresolved, complete: end < today, started: start <= today};
}

function getUnresolvedSessions(today, daysBack=21){
  const list = [];
  for(let i=1;i<=daysBack;i++){
    const dt = addDays(today,-i);
    const w = getWeekForDate(dt);
    if(!w) continue;
    const idx = getDayIndexInWeek(w,dt);
    const day = w.days[idx];
    if(day.z==='recup') continue;
    const key = isoKey(dt);
    if(!state.status[key]){
      list.push({key, dt, day, week:w});
    }
  }
  return list.reverse();
}

function renderAdjustment(today){
  const unresolved = getUnresolvedSessions(today, 21);
  const weekStatsList = weeks.map(w=>computeWeekStats(w,today)).filter(s=>s.started);
  const recentStats = weekStatsList.slice(-4);

  // Semaines "manquées" = >=50% des séances clés non faites (manquées + non renseignées), parmi les semaines terminées
  let consecutive = 0, consecutiveBlock = null;
  for(let i=weekStatsList.length-1;i>=0;i--){
    const s = weekStatsList[i];
    if(!s.complete) continue;
    if(s.total===0) continue;
    const ratioNonFait = (s.missed+s.unresolved)/s.total;
    if(ratioNonFait >= 0.5){
      consecutive++;
      if(!consecutiveBlock) consecutiveBlock = s.week.block;
    } else break;
  }

  let banner;
  if(consecutive===0){
    banner = {cls:'ok', html:`✅ <b>Tout est en ordre.</b> Continuez le programme tel quel — aucune séance de rattrapage nécessaire.`};
  } else if(consecutive===1){
    let extra = '';
    if(consecutiveBlock==='C' || consecutiveBlock==="C'") extra = ` Cette semaine manquée était en bloc C (spécifique montagne) : réduisez votre ambition d'environ 10 min sur le temps cible au sommet.`;
    banner = {cls:'warn', html:`🟡 <b>1 semaine manquée — pas de problème.</b> Ne rattrapez pas le volume perdu. Reprenez cette semaine à environ <b>70% du volume prévu</b>, puis reprenez le rythme normal la semaine suivante.${extra}`};
  } else if(consecutive===2){
    banner = {cls:'warn', html:`🟠 <b>2 semaines consécutives manquées.</b> Réajustez l'objectif : visez le scénario "prudent" (2h50–3h15) plutôt que "réaliste" le jour J, et reprenez progressivement à 70% de volume avant de remonter en charge.`};
  } else {
    banner = {cls:'danger', html:`🔴 <b>${consecutive} semaines consécutives manquées.</b> Le plan de secours recommande de reconsidérer l'objectif : viser uniquement à terminer l'ascension sans objectif de temps, ou envisager un report en 2027 si c'est possible pour vous. Reprenez très progressivement.`};
  }

  const alertItems = ['FC de repos élevée (+5 bpm vs normale)','Mauvais sommeil 3 nuits consécutives','Douleur musculaire persistante (pas de simples courbatures)','Démotivation profonde et durable'];
  const alertChecked = state.checklists['alerte'] || {};
  const alertCount = alertItems.reduce((n,_,i)=> n + (alertChecked[i]?1:0), 0);

  return `
  <div class="banner ${banner.cls}">${banner.html}</div>

  ${unresolved.length ? `
  <div class="card">
    <h2>📝 Séances non renseignées (${unresolved.length})</h2>
    <div class="task-note" style="margin-bottom:8px;">Marquez rapidement ce qui s'est passé — ça affine les recommandations ci-dessous.</div>
    ${unresolved.map(u=>`
      <div class="quick-item">
        <div class="qi-info">
          <div class="qi-date">${DAY_SHORT[u.dt.getDay()]} ${fmtDate(u.dt)} · Sem. ${u.week.num}</div>
          <div class="qi-name">${u.day.a}</div>
        </div>
        <div class="quick-actions">
          <button class="qa-btn ok" data-quick-key="${u.key}" data-quick-val="done">Fait</button>
          <button class="qa-btn no" data-quick-key="${u.key}" data-quick-val="missed">Manqué</button>
        </div>
      </div>
    `).join('')}
  </div>` : `<div class="card"><h2>📝 Séances non renseignées</h2><div class="tip">Rien à rattraper sur les 3 dernières semaines. 👍</div></div>`}

  <div class="card">
    <h2>📊 Bilan des dernières semaines</h2>
    ${recentStats.map(s=>{
      const pctDone = s.total ? Math.round(s.done/s.total*100) : 0;
      const pctMissed = s.total ? Math.round(s.missed/s.total*100) : 0;
      const pctUnres = 100-pctDone-pctMissed;
      return `<div class="week-stat-row">
        <div class="wn">S${s.week.num}</div>
        <div class="mini-bar">
          <div class="seg-done" style="width:${pctDone}%"></div>
          <div class="seg-missed" style="width:${pctMissed}%"></div>
          <div class="seg-unresolved" style="width:${pctUnres}%"></div>
        </div>
        <div style="font-size:11px; color:var(--text-dim); width:64px; text-align:right;">${s.done}/${s.total} faites</div>
      </div>`;
    }).join('')}
    <div class="task-note" style="margin-top:8px;">🟢 fait · 🔴 manqué · ⚪ non renseigné</div>
  </div>

  <div class="card">
    <h2>🚦 Auto-diagnostic — signes d'alerte</h2>
    <div class="task-note" style="margin-bottom:6px;">Cochez ce qui s'applique en ce moment.</div>
    ${alertItems.map((label,i)=>{
      const checked = !!alertChecked[i];
      return `<div class="alert-check">
        <div class="checkbox ${checked?'checked':''}" style="width:20px;height:20px;flex-shrink:0;" data-checklist="alerte" data-item="${i}"></div>
        <span>${label}</span>
      </div>`;
    }).join('')}
    ${alertCount>=2 ? `<div class="banner danger" style="margin-top:10px;">🔴 ${alertCount} signes présents : ces indices évoquent un sur-entraînement. Action recommandée : 3–5 jours de repos total. En cas de douleur articulaire, consultez un médecin du sport.</div>` : `<div class="tip" style="margin-top:4px;">Moins de 2 signes = fatigue normale d'entraînement.</div>`}
  </div>

  <div class="card">
    <h2>🌧️ Semaines pluvieuses / indisponibilité</h2>
    <div class="tip">Coupe-vent imperméable + gants de pluie : les routes lyonnaises restent praticables sous la pluie. Si vraiment dangereux (orage, verglas), remplacez par 45 min de vélo d'appartement fractionné (équivaut à ~1h30 de sortie facile).</div>
  </div>

  <div class="card">
    <h2>📉 Difficulté à tenir le volume</h2>
    <div class="tip">Le dénivelé compte plus que le kilométrage plat : 60 km avec 1000 m D+ vaut mieux que 100 km à plat pour le Ventoux. Si besoin, fractionnez la sortie longue (2h samedi + 2h dimanche). Gardez en priorité les séances de qualité (côtes, seuil), même raccourcies.</div>
  </div>
  `;
}

/* ============ EVENTS ============ */
function attachHandlers(){
  document.querySelectorAll('[data-status-key]').forEach(el=>{
    el.onclick = ()=>{
      const key = el.getAttribute('data-status-key');
      const val = el.getAttribute('data-status-val');
      const cur = state.status[key];
      setStatus(key, cur===val ? null : val);
      render();
    };
  });
  document.querySelectorAll('[data-quick-key]').forEach(el=>{
    el.onclick = ()=>{
      setStatus(el.getAttribute('data-quick-key'), el.getAttribute('data-quick-val'));
      render();
    };
  });
  document.querySelectorAll('[data-week]').forEach(el=>{
    el.onclick = ()=>{
      const n = parseInt(el.getAttribute('data-week'));
      openWeek = openWeek===n ? null : n;
      render();
    };
  });
  document.querySelectorAll('[data-checklist]').forEach(el=>{
    el.onclick = ()=>{
      toggleChecklist(el.getAttribute('data-checklist'), el.getAttribute('data-item'));
      render();
    };
  });
  document.querySelectorAll('[data-nutsub]').forEach(el=>{
    el.onclick = ()=>{ nutritionSub = el.getAttribute('data-nutsub'); render(); };
  });
}

document.querySelectorAll('nav button').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.getAttribute('data-tab');
    render();
  };
});
